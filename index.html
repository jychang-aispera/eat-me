<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 뭐 먹지?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E2DDD7;
    --border2: #CCC7BF;
    --text-primary: #1A1714;
    --text-secondary: #6B6560;
    --text-tertiary: #9B9590;
    --accent: #D4622A;
    --accent-soft: #FAF0EB;
    --accent-hover: #BF5523;
    --friday: #2A7DD4;
    --friday-soft: #EBF3FA;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 16px 84px;
    transition: background 0.5s, color 0.4s;
    position: relative;
    overflow-x: hidden;
  }

  /* ══════════════════════════════
     FRIDAY PARTY MODE
  ══════════════════════════════ */
  body.party { background: #0D0D1A; color: #F0EEF8; }
  body.party .container { position: relative; z-index: 1; }

  body.party .title { color: #F0EEF8; }
  body.party .title span {
    background: linear-gradient(90deg,#FF6BBA,#FFDA36,#59FFB0,#5DB8FF,#C87FFF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; animation: rainbow-shift 3s linear infinite; background-size: 300%;
  }
  @keyframes rainbow-shift { 0%{background-position:0%} 100%{background-position:300%} }

  body.party .result-box {
    background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15);
    box-shadow: 0 0 40px rgba(180,100,255,0.2), 0 0 80px rgba(100,180,255,0.1);
  }
  body.party .result-box::before {
    background: linear-gradient(90deg,#FF6BBA,#FFDA36,#59FFB0,#5DB8FF,#C87FFF);
    background-size: 300%; animation: rainbow-shift 2s linear infinite;
  }
  body.party .result-name { color: #fff; text-shadow: 0 0 30px rgba(200,150,255,0.6); }
  body.party .result-meta { color: rgba(255,255,255,0.5); }
  body.party .result-meta .badge { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  body.party .result-meta .nocoupon-badge { background: rgba(192,57,43,0.3); color: #FF9F9F; border-color: rgba(192,57,43,0.5); }

  body.party .pick-btn {
    background: linear-gradient(135deg,#FF6BBA,#C87FFF,#5DB8FF);
    background-size: 300%; animation: rainbow-shift 2s linear infinite;
    border-color: transparent; box-shadow: 0 4px 20px rgba(180,100,255,0.4); color: #fff;
  }
  body.party .pick-btn:hover:not(:disabled) { filter: brightness(1.15); }

  body.party .section-label { color: rgba(255,255,255,0.3); }
  body.party .cat-tab { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.55); }
  body.party .cat-tab:hover { border-color: rgba(255,255,255,0.3); }
  body.party .cat-tab.active { background: linear-gradient(135deg,#C87FFF,#5DB8FF); border-color: transparent; color:#fff; }
  body.party .cat-tab.friday-tab.active { background: linear-gradient(135deg,#FF6BBA,#FFDA36); border-color:transparent; }

  body.party .menu-count { color: rgba(255,255,255,0.3); }
  body.party .menu-chip { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
  body.party .menu-chip:hover { border-color: rgba(255,255,255,0.25); }
  body.party .menu-chip.active { border-color: #C87FFF; background: rgba(200,127,255,0.18); color: #E0BFFF; }
  body.party .menu-chip.friday-only { border-style: dashed; border-color: rgba(255,107,186,0.4); }
  body.party .menu-chip.friday-only.active { border-color: #FF6BBA; background: rgba(255,107,186,0.18); color: #FFB8DF; border-style: dashed; }

  body.party .day-badge { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
  body.party .day-badge.friday-on { background: rgba(200,127,255,0.2); border-color: #C87FFF; color: #E0BFFF; }
  body.party .day-badge.friday-on .dot { background: #C87FFF; }

  /* confetti canvas */
  #confetti-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: 0; transition: opacity 0.5s; will-change: transform;
  }
  #confetti-canvas.active { opacity: 1; }

  /* party floating emoji */
  .party-emoji {
    position: fixed; pointer-events: none; z-index: 0;
    font-size: 22px; opacity: 0; user-select: none;
    animation: float-up 3.5s ease-in forwards;
  }
  @keyframes float-up {
    0%  { transform: translateY(0) rotate(0deg);     opacity: 0.9; }
    80% { opacity: 0.5; }
    100%{ transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* ══════════════════════════════
     NORMAL STYLES
  ══════════════════════════════ */
  .container { max-width: 520px; margin: 0 auto; }

  .header { margin-bottom: 20px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .header-right { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    transition: color 0.4s;
    flex: 1;
    min-width: 0;
  }
  .title span { color: var(--accent); transition: color 0.4s; }
  .title-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    text-align: left;
    color: inherit;
    font: inherit;
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .title-btn:hover { text-decoration: underline; text-underline-offset: 3px; }

  .set-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    flex-shrink: 0;
  }
  .set-pill-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-tertiary);
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
  .set-dd { position: relative; }
  .set-dd-btn {
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-secondary);
    border-radius: 999px;
    padding: 5px 26px 5px 10px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    line-height: 1.2;
    max-width: 220px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .set-dd-btn::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-48%);
    font-size: 12px;
    color: var(--text-tertiary);
    pointer-events: none;
  }
  .set-dd-menu {
    position: absolute;
    left: 0;
    top: calc(100% + 8px);
    min-width: 200px;
    max-width: min(280px, 74vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.10);
    padding: 5px;
    display: none;
    z-index: 20;
  }
  .set-dd.open .set-dd-menu { display: block; }
  .set-dd-item {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-secondary);
    border-radius: 12px;
    padding: 8px 9px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .set-dd-item:hover { background: var(--surface2); }
  .set-dd-item.active {
    background: var(--accent-soft);
    border-color: rgba(212, 98, 42, 0.22);
    color: var(--accent);
  }
  .set-dd-main { min-width: 0; display: flex; align-items: center; gap: 8px; flex: 1; }
  .set-dd-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .set-dd-edit-btn {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .set-dd-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .set-dd-key {
    font-size: 10px;
    font-weight: 800;
    color: var(--text-tertiary);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .set-dd-item.active .set-dd-key {
    background: rgba(212, 98, 42, 0.12);
    border-color: rgba(212, 98, 42, 0.18);
    color: var(--accent);
  }

  body.party .set-pill {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 0 24px rgba(180,100,255,0.12);
  }
  body.party .set-pill-label { color: rgba(255,255,255,0.5); }
  body.party .set-dd-btn {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.78);
  }
  body.party .set-dd-btn::after { color: rgba(255,255,255,0.55); }
  body.party .set-dd-menu {
    background: rgba(13, 13, 26, 0.92);
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 0 36px rgba(180,100,255,0.18);
    backdrop-filter: blur(6px);
  }
  body.party .set-dd-item { color: rgba(255,255,255,0.72); }
  body.party .set-dd-item:hover { background: rgba(255,255,255,0.08); }
  body.party .set-dd-item.active {
    background: rgba(200,127,255,0.18);
    border-color: rgba(200,127,255,0.30);
    color: #E0BFFF;
  }
  body.party .set-dd-key {
    color: rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.14);
  }
  body.party .set-dd-item.active .set-dd-key {
    background: rgba(200,127,255,0.18);
    border-color: rgba(200,127,255,0.26);
    color: #E0BFFF;
  }
  body.party .set-dd-edit-btn {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.78);
  }
  body.party .set-dd-edit-btn:hover { border-color: #C87FFF; color: #E0BFFF; }
  .set-dd-divider { height: 1px; background: var(--border); margin: 4px 4px; }
  .set-dd-add-btn {
    width: 100%;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-tertiary);
    border-radius: 10px;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    text-align: left;
  }
  .set-dd-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  body.party .set-dd-divider { background: rgba(255,255,255,0.12); }
  body.party .set-dd-add-btn { border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.5); }
  body.party .set-dd-add-btn:hover { border-color: #C87FFF; color: #E0BFFF; background: rgba(200,127,255,0.12); }

  .day-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    background: var(--surface2); color: var(--text-secondary);
    border: 1px solid var(--border); cursor: pointer; user-select: none; transition: all 0.3s;
  }
  .day-badge.friday-on { background: var(--friday-soft); color: var(--friday); border-color: #A8CFF0; }
  .day-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); transition: background 0.3s; }
  .day-badge.friday-on .dot { background: var(--friday); }

  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 28px 20px 22px;
    text-align: center; margin-bottom: 12px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
  }
  .result-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent); opacity: 0; transition: opacity 0.3s;
  }
  .result-box.revealed::before { opacity: 1; }

  .result-emoji { font-size: 36px; margin-bottom: 8px; line-height: 1; display: block; }
  .result-name {
    font-size: 30px; font-weight: 700; letter-spacing: -1px;
    color: var(--text-primary); margin-bottom: 10px; line-height: 1.2; min-height: 1.2em;
    transition: color 0.4s, text-shadow 0.4s;
  }
  .result-meta {
    font-size: 12px; color: var(--text-tertiary);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    flex-wrap: wrap; transition: color 0.4s;
  }
  .result-meta .badge {
    padding: 2px 8px; border-radius: 20px; font-size: 11px;
    background: var(--surface2); color: var(--text-secondary);
    transition: background 0.4s, color 0.4s;
  }
  .result-meta .badge.friday-badge { background: var(--friday-soft); color: var(--friday); }
  /* 식권대장 안되는 곳 경고 뱃지 */
  .nocoupon-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    background: #FAECEA; color: #C0392B; border: 1px solid #F5C6C0;
    transition: background 0.4s, color 0.4s;
  }

  .spinning .result-name { animation: flicker 0.1s infinite; }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .pick-btn {
    width: 100%; padding: 14px;
    font-size: 15px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; border-radius: var(--radius-md); border: 1px solid var(--border);
    background: var(--accent); color: #fff;
    transition: background 0.3s, filter 0.15s, transform 0.1s, box-shadow 0.3s;
    margin-bottom: 20px; letter-spacing: -0.3px;
  }
  .pick-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .pick-btn:active:not(:disabled) { transform: scale(0.985); }
  .pick-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .pick-btn.friday-mode { background: var(--friday); border-color: transparent; }
  .pick-btn.friday-mode:hover:not(:disabled) { background: #1E6BBD; }

  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; transition: color 0.4s;
  }
  .cat-scroll { margin-bottom: 12px; }
  .cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-tab {
    padding: 6px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .cat-tab:hover { border-color: var(--border2); }
  .cat-tab.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  .cat-tab.friday-tab.active { background: var(--friday); border-color: var(--friday); }

  .menu-count { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; transition: color 0.4s; }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
  .menu-chip {
    padding: 8px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: space-between; gap: 4px;
    background: var(--surface); transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .menu-chip.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .menu-chip.friday-only { border-style: dashed; }
  .menu-chip.friday-only.active { border-color: var(--friday); background: var(--friday-soft); color: var(--friday); border-style: dashed; }

  .chip-left { display: flex; align-items: center; gap: 5px; min-width: 0; }
  .chip-cats { display: flex; gap: 2px; flex-shrink: 0; }
  .chip-cat-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .chip-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-cnt { font-size: 11px; opacity: 0.65; flex-shrink: 0; }

  .cat-badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .empty-state { text-align: center; padding: 28px 0; color: var(--text-tertiary); font-size: 13px; }

  /* ── 메뉴 직접 선택(핀) ── */
  .menu-chip.pinned { border-color: #2AB87D; background: #EBF9F3; color: #1A8A5A; }
  .menu-chip.pinned.friday-only { border-color: #2AB87D; border-style: dashed; }
  body.party .menu-chip.pinned { border-color: #59FFB0; background: rgba(89,255,176,0.15); color: #59FFB0; }
  body.party .menu-chip.pinned.friday-only { border-style: dashed; }

  .menu-count { display: flex; align-items: center; gap: 8px; }
  .pin-clear-btn {
    font-size: 11px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
    background: none; border: 1px solid #2AB87D; border-radius: 20px;
    color: #1A8A5A; padding: 1px 8px; cursor: pointer; line-height: 1.6;
  }
  body.party .pin-clear-btn { border-color: #59FFB0; color: #59FFB0; }
  .pin-clear-btn:hover { background: #2AB87D; color: #fff; }
  body.party .pin-clear-btn:hover { background: rgba(89,255,176,0.25); }

  .site-footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10;
    background: rgba(247, 245, 242, 0.94);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(6px);
  }
  .site-footer-inner {
    max-width: 520px;
    margin: 0 auto;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .footer-gh-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
    min-width: 0;
  }
  .footer-gh-link:hover { color: var(--accent); }
  .footer-gh-icon { flex-shrink: 0; opacity: 0.65; }
  .footer-gh-link:hover .footer-gh-icon { opacity: 1; }
  .footer-gh-link span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .footer-rn-btn {
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-secondary);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
  .footer-rn-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Release Notes 모달 */
  .rn-modal {
    position: fixed; inset: 0; z-index: 40;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .rn-modal.open { display: flex; }
  .rn-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(2px);
  }
  .rn-box {
    position: relative;
    width: 100%;
    max-width: 520px;
    max-height: 70vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -6px 32px rgba(0,0,0,0.14);
    overflow-y: auto;
    padding: 16px 16px 24px;
  }
  .rn-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .rn-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-primary);
  }
  .rn-close {
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-secondary);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }
  .rn-close:hover { border-color: var(--accent); color: var(--accent); }
  .rn-list {
    margin: 0; padding: 0; list-style: none;
    display: grid; gap: 6px;
  }
  .release-item {
    border: 1px solid var(--border);

<script>
/* ╔══════════════════════════════════════════════════════════════════╗
   ║  ✏️  수정 포인트: 데이터 파일만 수정하세요                           ║
   ╚══════════════════════════════════════════════════════════════════╝

   - category.json  : 카테고리 정의
   - menu.default.json  : 기본 메뉴
   - ui-config.json : 파티 이모지/컨페티 색상
   - release-notes.json : 릴리즈 노트 목록
*/

/* ── 카테고리 정의 ──────────────────────────────────────────────── */
let CATEGORY = {};

/* ── 메뉴 목록 (외부 JSON 로드) ─────────────────────────────────── */
let menu = [];
let CONFETTI_COLORS = [];
let PARTY_EMOJIS = [];
let RELEASE_NOTES = [];
let SETS = [];
let CURRENT_SET_KEY = '';
let setMenuOpen = false;
let REQUESTED_SET_KEY = '';
let REQUESTED_SET_EXISTS = true;

// edit mode state (in-memory; downloads files instead of saving)
let editOpen = false;
let editSetKey = '';
let editSetLabel = '';
let editItems = [];
let editDirty = false;
let editForm = null; // { idx|null, name, count, fridayOnly, category[] }
let INITIAL_SETS_JSON = '';
let INITIAL_CATEGORY_JSON = '';
let ORIGINAL_MENU_JSON_BY_KEY = {};
const GITHUB_DATA_PATH_URL = 'https://github.com/jychang-aispera/eat-me';

/* ╔══════════════════════════════════════════════════════════════════╗
   ║  ⚙️  여기서부터는 로직 영역 — 수정 불필요                            ║
   ╚══════════════════════════════════════════════════════════════════╝ */

/* ── 상태 ──────────────────────────────────────────────────────── */
let activeCat    = 'all';
let fridayMode   = false;
let animTimer    = null;
let pickedIdx    = -1;
let lastChipEl   = null;   // 직전 하이라이트 칩 참조 (DOM 탐색 최소화)
let confettiRAF  = null;
let confettiRunning = false;
let pinnedIdxs   = new Set();  // 사용자가 직접 선택한 메뉴 인덱스
let visibleCount = 0;          // 현재 카테고리 기준 표시 메뉴 수 (menuCount 재갱신용)

/* ── 초기화 ────────────────────────────────────────────────────── */
function injectCatStyles() {
  const style = document.createElement('style');
  style.textContent = Object.entries(CATEGORY)
    .filter(([, v]) => v.color)
    .map(([k, v]) => `.cat-${k} { background: ${v.color}; }`)
    .join('\n');
  document.head.appendChild(style);
}

async function loadJson(path) {
  const res = await fetch(path, { cache: 'no-store' });
  if (!res.ok) throw new Error(`${path} 로드 실패: ${res.status}`);
  return res.json();
}

async function tryLoadJson(path) {
  const res = await fetch(path, { cache: 'no-store' });
  if (!res.ok) return null;
  return res.json();
}

function sanitizeProfileKey(raw) {
  if (!raw) return null;
  const trimmed = String(raw).trim();
  // 파일명 주입 방지: 영문/숫자/._- 만 허용
  if (!/^[a-zA-Z0-9._-]+$/.test(trimmed)) return null;
  return trimmed;
}

async function loadMenuByQueryParam() {
  const params = new URLSearchParams(window.location.search);
  const requestedKey = sanitizeProfileKey(params.get('set'));

  if (requestedKey) {
    const candidatePath = `./menu.${requestedKey}.json`;
    const candidateData = await tryLoadJson(candidatePath);
    if (Array.isArray(candidateData)) {
      return { menuData: candidateData, menuPath: candidatePath, setKey: requestedKey, requestedKey, exists: true };
    }
    return { menuData: await loadJson('./menu.default.json'), menuPath: './menu.default.json', setKey: '', requestedKey, exists: false };
  }

  const defaultPath = './menu.default.json';
  return { menuData: await loadJson(defaultPath), menuPath: defaultPath, setKey: '', requestedKey: '', exists: true };
}

async function loadDataFiles() {
  const [categoryData, uiConfig, releaseNotesData, setsData] = await Promise.all([
    loadJson('./category.json'),
    loadJson('./ui-config.json'),
    loadJson('./release-notes.json'),
    tryLoadJson('./sets.json'),
  ]);
  const { menuData, menuPath, setKey, requestedKey, exists } = await loadMenuByQueryParam();
  if (!categoryData || typeof categoryData !== 'object' || Array.isArray(categoryData)) {
    throw new Error('category.json 형식 오류');
  }
  if (!Array.isArray(menuData)) throw new Error(`${menuPath} 형식 오류`);
  if (!uiConfig || typeof uiConfig !== 'object' || Array.isArray(uiConfig)) {
    throw new Error('ui-config.json 형식 오류');
  }
  if (!Array.isArray(releaseNotesData)) throw new Error('release-notes.json 형식 오류');
  if (!Array.isArray(uiConfig.confettiColors)) throw new Error('ui-config.json confettiColors 형식 오류');
  if (!Array.isArray(uiConfig.partyEmojis)) throw new Error('ui-config.json partyEmojis 형식 오류');
  if (setsData != null && !Array.isArray(setsData)) throw new Error('sets.json 형식 오류');
  CATEGORY = categoryData;
  menu = menuData;
  CONFETTI_COLORS = uiConfig.confettiColors;
  PARTY_EMOJIS = uiConfig.partyEmojis;
  RELEASE_NOTES = releaseNotesData;
  SETS = (Array.isArray(setsData) ? setsData : [])
    .filter(s => s && typeof s === 'object')
    .map(s => ({ key: sanitizeProfileKey(s.key) ?? '', label: String(s.label ?? s.key ?? '기본') }));
  // 기본 세트는 항상 존재하게
  if (!SETS.some(s => (s.key ?? '') === '')) SETS.unshift({ key: '', label: '기본' });
  CURRENT_SET_KEY = setKey ?? '';
  REQUESTED_SET_KEY = requestedKey ?? '';
  REQUESTED_SET_EXISTS = !!exists;
  INITIAL_SETS_JSON = JSON.stringify(getSetsDownloadData(), null, 2);
  INITIAL_CATEGORY_JSON = JSON.stringify(CATEGORY, null, 2);
  ORIGINAL_MENU_JSON_BY_KEY[CURRENT_SET_KEY ?? ''] = JSON.stringify(menu, null, 2);
}

function renderReleaseNotes() {
  const listEl = document.getElementById('releaseNotesList');
  if (!listEl) return;
  if (!Array.isArray(RELEASE_NOTES) || RELEASE_NOTES.length === 0) {
    listEl.innerHTML = '<li class="release-empty">릴리즈 노트가 없습니다.</li>';
    return;
  }
  listEl.innerHTML = RELEASE_NOTES.map((note) => {
    const raw = String(note ?? '').trim();
    const m = raw.match(/^(\d{4}-\d{2}-\d{2})\s*:\s*(.+)$/);
    const date = m?.[1] ?? '';
    const text = m?.[2] ?? raw;
    return `
      <li class="release-item">
        ${date ? `<span class="release-date">${date}</span>` : ''}
        <span class="release-text">${escapeHtml(text)}</span>
      </li>`;
  }).join('');
}

function openReleaseNotes() {
  const modal = document.getElementById('rnModal');
  if (!modal) return;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}

function closeReleaseNotes() {
  const modal = document.getElementById('rnModal');
  if (!modal) return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

function escapeHtml(s) {
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

async function init() {
  try {
    await loadDataFiles();
    injectCatStyles();
    renderReleaseNotes();
    renderSetPicker();
  } catch (err) {
    console.error(err);
    document.getElementById('resultName').textContent = '데이터 로드 실패';
    document.getElementById('resultMeta').innerHTML = '<span>category.json / menu.default.json / menu.*.json / ui-config.json / release-notes.json 파일을 확인해주세요</span>';
    return;
  }
  if (new Date().getDay() === 5) { fridayMode = true; activeCat = 'friday'; applyPartyMode(); }
  buildCatTabs();
  renderGrid();
  maybeOpenEditFromHash();
}

function isEditHash() {
  return String(window.location.hash || '').toLowerCase() === '#edit';
}

function maybeOpenEditFromHash() {
  if (!isEditHash()) return;
  openEditModal();
}

window.addEventListener('hashchange', () => {
  if (isEditHash()) openEditModal();
  else closeEditModal(true);
});

function getSetLabelByKey(key) {
  const found = SETS.find(s => (s.key ?? '') === (key ?? ''));
  return found?.label ?? (key ? key : '기본');
}

function closeEditModal(keepHash = false) {
  const modal = document.getElementById('editModal');
  if (modal) {
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
  }
  editOpen = false;
  if (!keepHash && isEditHash()) {
    // remove hash without reloading
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
}

function openCreateSetModal() {
  const modal = document.getElementById('editModal');
  if (!modal) return;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  editOpen = true;
  editSetKey = '';
  editSetLabel = '새 세트';
  editDirty = false;
  editForm = null;
  const title = document.getElementById('editTitle');
  const sub = document.getElementById('editSub');
  if (title) title.textContent = '새 세트 만들기';
  if (sub) sub.textContent = 'set key와 이름을 입력하고 편집을 시작하세요';
  renderEditCreateView('');
}

function openEditModal() {
  const modal = document.getElementById('editModal');
  if (!modal) return;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  editOpen = true;

  // Determine target set:
  // - if user asked ?set=key#edit => edit that key
  // - else edit currently loaded (default or existing)
  const target = REQUESTED_SET_KEY || CURRENT_SET_KEY || '';
  const exists = REQUESTED_SET_KEY ? REQUESTED_SET_EXISTS : true;
  editSetKey = target || '';
  editSetLabel = getSetLabelByKey(editSetKey);
  editDirty = false;
  editForm = null;

  const title = document.getElementById('editTitle');
  const sub = document.getElementById('editSub');
  if (title) title.textContent = `세트 편집: ${editSetLabel}`;
  if (sub) {
    const fileName = editSetKey ? `menu.${editSetKey}.json` : 'menu.default.json';
    sub.textContent = `${fileName} 편집 → 다운로드로 반영 (GitHub에 업로드/교체)`;
  }

  // 기본 세트(key='')는 읽기 전용
  if ((editSetKey ?? '') === '') {
    const body = document.getElementById('editBody');
    if (title) title.textContent = '기본 세트 (읽기 전용)';
    if (sub) sub.textContent = 'menu.default.json은 수정할 수 없습니다';
    if (body) body.innerHTML = `
      <div class="edit-sub" style="margin-top:16px;line-height:1.7">
        기본 세트는 읽기 전용입니다.<br>
        SET 드롭다운 → <b>+ 새 세트 추가</b>로 개인 세트를 만들어 사용하세요.
      </div>
      <div class="edit-actions" style="margin-top:14px">
        <button class="edit-btn primary" type="button" onclick="closeEditModal();setTimeout(()=>{openCreateSetModal();},120)">새 세트 만들기</button>
        <button class="edit-btn ghost" type="button" onclick="closeEditModal()">닫기</button>
      </div>`;
    return;
  }

  if (REQUESTED_SET_KEY && !exists) {
    // Requested set file does not exist yet: offer create flow
    editItems = [];
    renderEditCreateView(editSetKey);
    return;
  }

  // Existing set: clone currently loaded menu into editor when keys match,
  // otherwise try to load from file lazily (best effort).
  if ((editSetKey ?? '') === (CURRENT_SET_KEY ?? '')) {
    editItems = JSON.parse(JSON.stringify(menu));
    ORIGINAL_MENU_JSON_BY_KEY[editSetKey ?? ''] = JSON.stringify(editItems, null, 2);
    renderEditMainView();
  } else if (editSetKey) {
    loadJson(`./menu.${editSetKey}.json`).then((data) => {
      editItems = Array.isArray(data) ? JSON.parse(JSON.stringify(data)) : [];
      ORIGINAL_MENU_JSON_BY_KEY[editSetKey] = JSON.stringify(editItems, null, 2);
      renderEditMainView();
    }).catch(() => {
      editItems = [];
      ORIGINAL_MENU_JSON_BY_KEY[editSetKey] = '__MISSING__';
      renderEditCreateView(editSetKey);
    });
  } else {
    editItems = JSON.parse(JSON.stringify(menu));
    ORIGINAL_MENU_JSON_BY_KEY[''] = JSON.stringify(editItems, null, 2);
    renderEditMainView();
  }
}

function renderEditCreateView(prefilledKey) {
  const body = document.getElementById('editBody');
  if (!body) return;
  const keyDefault = sanitizeProfileKey(prefilledKey) ?? '';
  const copyChips = SETS.map(({ key, label }) => {
    const k = key ?? '';
    const l = escapeHtml(label ?? (k || '기본'));
    return `<div class="tmpl-chip" data-tmpl="copy:${escapeHtml(k)}" onclick="selectTmplChip(this)">${l}</div>`;
  }).join('');
  body.innerHTML = `
    <div class="edit-row">
      <div class="edit-field">
        <label>새 set key</label>
        <input class="edit-input" id="newSetKey" placeholder="예: infra" value="${escapeHtml(keyDefault)}" />
      </div>
      <div class="edit-field">
        <label>표시명(label)</label>
        <input class="edit-input" id="newSetLabel" placeholder="예: 인프라플랫폼팀" value="${escapeHtml(keyDefault || '')}" />
      </div>
    </div>
    <div class="edit-field" style="margin-top:10px">
      <label>템플릿</label>
      <div class="tmpl-chips" id="newSetTemplateChips">
        <div class="tmpl-chip on" data-tmpl="empty" onclick="selectTmplChip(this)">빈 세트</div>
        ${copyChips}
      </div>
      ${SETS.length ? '<div class="tmpl-group-label" style="margin-top:6px">세트 이름 선택 시 해당 세트를 복사합니다</div>' : ''}
    </div>
    <div class="edit-actions">
      <button class="edit-btn primary" type="button" onclick="createNewSetFromEditor()">새 세트 만들고 편집 시작</button>
      <button class="edit-btn ghost" type="button" onclick="closeEditModal()">닫기</button>
    </div>
    <div class="edit-row one" style="margin-top:10px">
      <div class="edit-field">
        <label>GitHub 반영 경로</label>
        <a class="edit-gh-link" href="${escapeHtml(GITHUB_DATA_PATH_URL)}" target="_blank" rel="noopener noreferrer">${escapeHtml(GITHUB_DATA_PATH_URL)}</a>
      </div>
    </div>
    <div class="edit-divider"></div>
    <div class="edit-sub">팁: 새 세트는 서버에 저장되지 않습니다. 편집 완료 후 파일을 내려받아 GitHub에 업로드하면 됩니다.</div>
  `;
}

function selectTmplChip(el) {
  const parent = el.closest('#newSetTemplateChips');
  if (!parent) return;
  parent.querySelectorAll('.tmpl-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
}

async function createNewSetFromEditor() {
  const keyEl = document.getElementById('newSetKey');
  const labelEl = document.getElementById('newSetLabel');
  const rawKey = sanitizeProfileKey(keyEl?.value);
  if (!rawKey) {
    alert('set key는 영문/숫자/._- 만 사용할 수 있어요.');
    return;
  }
  const label = String(labelEl?.value || rawKey).trim() || rawKey;
  const activeChip = document.querySelector('#newSetTemplateChips .tmpl-chip.on');
  const tmpl = activeChip?.dataset.tmpl ?? 'empty';

  editSetKey = rawKey;
  editSetLabel = label;

  // update SETS in-memory so the picker & sets download includes it
  if (!SETS.some(s => (s.key ?? '') === rawKey)) {
    SETS.push({ key: rawKey, label });
  } else {
    SETS = SETS.map(s => (s.key ?? '') === rawKey ? { key: rawKey, label } : s);
  }
  renderSetPicker();

  const baseUrl = getBaseUrl();
  history.replaceState(null, '', `${baseUrl}?set=${encodeURIComponent(rawKey)}#edit`);
  REQUESTED_SET_KEY = rawKey;
  REQUESTED_SET_EXISTS = false;
  CURRENT_SET_KEY = rawKey;

  if (tmpl.startsWith('copy:')) {
    const srcKey = tmpl.slice(5); // '' = 기본 세트, 'jychang' 등
    const cached = ORIGINAL_MENU_JSON_BY_KEY[srcKey];
    if (cached && cached !== '__MISSING__') {
      editItems = JSON.parse(cached);
    } else {
      const url = srcKey ? `./menu.${srcKey}.json` : './menu.default.json';
      try {
        const data = await loadJson(url);
        editItems = Array.isArray(data) ? JSON.parse(JSON.stringify(data)) : [];
      } catch {
        editItems = [];
      }
    }
  } else {
    editItems = [];
  }

  ORIGINAL_MENU_JSON_BY_KEY[editSetKey] = '__MISSING__';
  editDirty = true;
  const title = document.getElementById('editTitle');
  const sub = document.getElementById('editSub');
  if (title) title.textContent = `세트 편집: ${editSetLabel}`;
  if (sub) sub.textContent = `menu.${editSetKey}.json 편집 → 다운로드로 반영 (GitHub에 업로드/교체)`;
  renderEditMainView();
}

function renderEditMainView() {
  const body = document.getElementById('editBody');
  if (!body) return;

  const fileName = editSetKey ? `menu.${editSetKey}.json` : 'menu.default.json';
  const dirtyMark = editDirty ? ' · 변경됨' : '';

  body.innerHTML = `
    <div class="edit-row one">
      <div class="edit-field">
        <label>대상 파일</label>
        <input class="edit-input" value="${escapeHtml(fileName + dirtyMark)}" readonly />
      </div>
    </div>
    <div class="edit-actions">
      <button class="edit-btn primary" type="button" onclick="openEditItemForm(null)">+ 메뉴 추가</button>
      <button class="edit-btn" type="button" onclick="downloadChangedFiles()">필요 파일 원클릭 다운로드</button>
      <button class="edit-btn ghost" type="button" onclick="closeEditModal()">닫기</button>
    </div>
    <div id="editFormSlot"></div>
    <div class="edit-row one" style="margin-top:10px">
      <div class="edit-field">
        <label>GitHub 반영 경로</label>
        <a class="edit-gh-link" href="${escapeHtml(GITHUB_DATA_PATH_URL)}" target="_blank" rel="noopener noreferrer">${escapeHtml(GITHUB_DATA_PATH_URL)}</a>
      </div>
    </div>
    <div class="edit-divider"></div>
    <div class="edit-list" id="editList"></div>
    <div class="edit-divider"></div>
    <div class="edit-sub">다운로드한 파일을 GitHub의 <b>eat-me/</b> 폴더에 업로드(교체)하면 반영됩니다.</div>
  `;

  renderEditList();
}

function renderEditList() {
  const listEl = document.getElementById('editList');
  if (!listEl) return;
  if (!Array.isArray(editItems) || editItems.length === 0) {
    listEl.innerHTML = `<div class="edit-sub">아직 메뉴가 없어요. “+ 메뉴 추가”로 시작하세요.</div>`;
    return;
  }
  listEl.innerHTML = editItems.map((it, idx) => {
    const cats = Array.isArray(it.category) ? it.category.join(', ') : '';
    const fri = it.fridayOnly ? ' · 금요일전용' : '';
    const inlineForm = (editForm && editForm.idx === idx) ? buildEditFormHtml(false) : '';
    return `
      <div class="edit-item">
        <div class="edit-item-top">
          <div style="min-width:0">
            <div class="edit-item-name">${escapeHtml(it.name ?? '')}</div>
            <div class="edit-item-meta">가중치 ×${escapeHtml(it.count ?? 1)} · ${escapeHtml(cats)}${fri}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="edit-btn" type="button" onclick="openEditItemForm(${idx})">수정</button>
            <button class="edit-btn danger" type="button" onclick="deleteEditItem(${idx})">삭제</button>
          </div>
        </div>
        ${inlineForm}
      </div>
    `;
  }).join('');
}

function getEditableCategoryKeys() {
  return Object.entries(CATEGORY)
    .filter(([k]) => k !== 'all')
    .map(([k]) => k);
}

function openEditItemForm(idxOrNull) {
  const idx = (typeof idxOrNull === 'number') ? idxOrNull : null;
  const cur = (idx != null) ? (editItems[idx] ?? {}) : {};
  const name = String(cur.name ?? '').trim();
  const count = Number(cur.count ?? 1) || 1;
  const fridayOnly = !!cur.fridayOnly;
  const cats = Array.isArray(cur.category) ? cur.category.slice() : [];
  editForm = { idx, name, count, fridayOnly, category: cats };
  renderEditList();
  renderAddFormSlot();
  // 새 항목 추가 시 폼이 상단에 바로 보이도록 포커스
  if (idx == null) {
    setTimeout(() => document.getElementById('efName')?.focus(), 50);
  }
}

function buildEditFormHtml(isAddForm) {
  if (!editForm) return '';
  const idx = editForm.idx;
  return `
    <div class="edit-divider"></div>
    <div class="edit-item-name">${isAddForm ? '메뉴 추가' : '메뉴 수정'}</div>
    <div class="edit-row">
      <div class="edit-field">
        <label>이름</label>
        <input class="edit-input" id="efName" value="${escapeHtml(editForm.name ?? '')}" placeholder="예: 멘노아지" />
      </div>
      <div class="edit-field">
        <label>가중치(count)</label>
        <input class="edit-input" id="efCount" type="number" min="1" step="1" value="${escapeHtml(editForm.count ?? 1)}" />
      </div>
    </div>
    <div class="edit-row one">
      <div class="edit-field">
        <label>옵션</label>
        <button class="edit-btn ghost" type="button" onclick="toggleEfFridayOnly()">${editForm.fridayOnly ? '금요일전용: ON' : '금요일전용: OFF'}</button>
      </div>
    </div>
    <div class="edit-field">
      <label>카테고리 (최소 1개)</label>
      <div class="edit-cat-chips" id="efCats">
        ${getEditableCategoryKeys().map((k) => {
          const v = CATEGORY[k] || {};
          const label = (v.emoji ? (v.emoji + ' ') : '') + (v.label || k);
          const on = editForm.category.includes(k);
          return `<div class="edit-cat-chip ${on ? 'on' : ''}" onclick="toggleEfCat('${escapeHtml(k)}')">${escapeHtml(label)}</div>`;
        }).join('')}
      </div>
    </div>
    <div class="edit-actions">
      <button class="edit-btn primary" type="button" onclick="saveEditItem()">저장</button>
      <button class="edit-btn ghost" type="button" onclick="cancelEditItem()">취소</button>
    </div>
  `;
}

function renderAddFormSlot() {
  const slot = document.getElementById('editFormSlot');
  if (!slot) return;
  if (editForm && editForm.idx == null) {
    slot.innerHTML = `<div class="edit-item">${buildEditFormHtml(true)}</div>`;
  } else {
    slot.innerHTML = '';
  }
}

function syncEditFormFromInputs() {
  if (!editForm) return;
  const nameEl = document.getElementById('efName');
  const countEl = document.getElementById('efCount');
  if (nameEl) editForm.name = String(nameEl.value ?? '').trim();
  if (countEl) {
    const n = Number(countEl.value ?? 1);
    editForm.count = (Number.isFinite(n) && n > 0) ? Math.floor(n) : 1;
  }
}

function renderEfCats() {
  // no-op: category chips are rendered by buildEditFormHtml
}

function toggleEfCat(k) {
  if (!editForm) return;
  syncEditFormFromInputs();
  const key = String(k).replaceAll('&amp;','&').replaceAll('&lt;','<').replaceAll('&gt;','>').replaceAll('&quot;','"').replaceAll('&#39;',"'");
  if (editForm.category.includes(key)) editForm.category = editForm.category.filter(x => x !== key);
  else editForm.category = [...editForm.category, key];
  renderEditList();
  renderAddFormSlot();
}

function toggleEfFridayOnly() {
  if (!editForm) return;
  syncEditFormFromInputs();
  editForm.fridayOnly = !editForm.fridayOnly;
  renderEditList();
  renderAddFormSlot();
}

function cancelEditItem() {
  editForm = null;
  renderEditList();
  renderAddFormSlot();
}

function saveEditItem() {
  if (!editForm) return;
  syncEditFormFromInputs();
  const name = String(editForm.name ?? '').trim();
  const count = Number(editForm.count ?? 1);
  if (!name) { alert('이름을 입력해주세요.'); return; }
  if (!Number.isFinite(count) || count < 1) { alert('가중치는 1 이상 숫자여야 해요.'); return; }
  if (!Array.isArray(editForm.category) || editForm.category.length === 0) { alert('카테고리를 최소 1개 선택해주세요.'); return; }

  const item = { name, count: Math.floor(count), category: editForm.category.slice(), fridayOnly: !!editForm.fridayOnly };
  if (editForm.idx == null) editItems.push(item);
  else editItems[editForm.idx] = item;

  editDirty = true;
  cancelEditItem();
  renderEditMainView();
}

function deleteEditItem(idx) {
  if (!confirm('삭제할까요?')) return;
  editItems.splice(idx, 1);
  editDirty = true;
  renderEditMainView();
}

function downloadBlob(filename, text) {
  const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function downloadMenuJson() {
  const filename = editSetKey ? `menu.${editSetKey}.json` : 'menu.default.json';
  downloadBlob(filename, JSON.stringify(editItems, null, 2) + '\n');
  editDirty = false;
  renderEditMainView();
}

function downloadSetsJson() {
  // ensure default entry exists, and ensure current set exists with label
  let out = Array.isArray(SETS) ? SETS.slice() : [];
  if (!out.some(s => (s.key ?? '') === '')) out.unshift({ key: '', label: '기본' });
  if (editSetKey && !out.some(s => (s.key ?? '') === editSetKey)) out.push({ key: editSetKey, label: editSetLabel || editSetKey });
  out = out.map(s => ({
    key: (s.key ?? ''),
    label: String((s.label ?? (s.key ?? '')) || '기본'),
  }));
  downloadBlob('sets.json', JSON.stringify(out, null, 2) + '\n');
}

function getSetsDownloadData() {
  let out = Array.isArray(SETS) ? SETS.slice() : [];
  if (!out.some(s => (s.key ?? '') === '')) out.unshift({ key: '', label: '기본' });
  if (editSetKey && !out.some(s => (s.key ?? '') === editSetKey)) out.push({ key: editSetKey, label: editSetLabel || editSetKey });
  return out.map(s => ({
    key: (s.key ?? ''),
    label: String((s.label ?? (s.key ?? '')) || '기본'),
  }));
}

function hasMenuChangesForEditSet() {
  const key = editSetKey ?? '';
  const original = ORIGINAL_MENU_JSON_BY_KEY[key];
  const now = JSON.stringify(editItems, null, 2);
  if (original === '__MISSING__') return true;
  if (typeof original !== 'string') return true;
  return original !== now;
}

function downloadChangedFiles() {
  const changed = [];
  if (hasMenuChangesForEditSet()) {
    const menuFilename = editSetKey ? `menu.${editSetKey}.json` : 'menu.default.json';
    changed.push({ filename: menuFilename, text: JSON.stringify(editItems, null, 2) + '\n' });
  }

  const setsNow = JSON.stringify(getSetsDownloadData(), null, 2);
  if (INITIAL_SETS_JSON !== setsNow) {
    changed.push({ filename: 'sets.json', text: setsNow + '\n' });
  }

  const categoryNow = JSON.stringify(CATEGORY, null, 2);
  if (INITIAL_CATEGORY_JSON !== categoryNow) {
    changed.push({ filename: 'category.json', text: categoryNow + '\n' });
  }

  if (changed.length === 0) {
    alert('다운로드할 변경 파일이 없습니다.');
    return;
  }
  changed.forEach((f) => downloadBlob(f.filename, f.text));
  editDirty = false;
  renderEditMainView();
}

function getBaseUrl() {
  // 쿼리/프래그먼트 제거한 기본 URL
  const base = window.location.origin === 'null' ? window.location.pathname : (window.location.origin + window.location.pathname);
  return base;
}

function goHome() {
  window.location.href = getBaseUrl();
}

function goEditForSet(setKey) {
  const key = sanitizeProfileKey(setKey) ?? '';
  const base = getBaseUrl();
  const query = key ? `?set=${encodeURIComponent(key)}` : '';
  window.location.href = `${base}${query}#edit`;
}

function renderSetPicker() {
  const btn = document.getElementById('setBtn');
  const menuEl = document.getElementById('setMenu');
  if (!btn || !menuEl) return;

  const current = SETS.find(s => (s.key ?? '') === (CURRENT_SET_KEY ?? ''));
  btn.textContent = current?.label ?? (CURRENT_SET_KEY ? CURRENT_SET_KEY : '기본');

  menuEl.innerHTML = '';
  SETS.forEach(({ key, label }) => {
    const realKey = key ?? '';
    const realLabel = (label ?? (realKey ? realKey : '기본'));
    const showKeyBadge = realKey !== '' && realLabel !== realKey;
    const item = document.createElement('div');
    item.className = 'set-dd-item' + (realKey === (CURRENT_SET_KEY ?? '') ? ' active' : '');
    item.setAttribute('role', 'menuitem');
    item.onclick = () => {
      closeSetDropdown();
      onSetChange(realKey);
    };
    const isDefault = realKey === '';
    item.innerHTML = `
      <span class="set-dd-main">
        <span class="set-dd-label">${escapeHtml(realLabel)}</span>
        ${showKeyBadge ? `<span class="set-dd-key">${escapeHtml(realKey)}</span>` : ''}
      </span>
      ${isDefault ? '' : '<button class="set-dd-edit-btn" type="button">수정</button>'}
    `;
    if (!isDefault) {
      const editBtn = item.querySelector('.set-dd-edit-btn');
      if (editBtn) {
        editBtn.onclick = (e) => {
          e.stopPropagation();
          closeSetDropdown();
          goEditForSet(realKey);
        };
      }
    }
    menuEl.appendChild(item);
  });

  // 새 세트 추가 버튼
  const divider = document.createElement('div');
  divider.className = 'set-dd-divider';
  menuEl.appendChild(divider);

  const addBtn = document.createElement('button');
  addBtn.className = 'set-dd-add-btn';
  addBtn.type = 'button';
  addBtn.textContent = '+ 새 세트 추가';
  addBtn.onclick = () => {
    closeSetDropdown();
    openCreateSetModal();
  };
  menuEl.appendChild(addBtn);
}

function onSetChange(nextKey) {
  const key = sanitizeProfileKey(nextKey) ?? '';
  const base = getBaseUrl();
  const nextUrl = key ? `${base}?set=${encodeURIComponent(key)}` : base;
  // UX 단순화를 위해 URL만 바꾸고 새로고침 (정적 호스팅에서 가장 안정적)
  window.location.href = nextUrl;
}

function openSetDropdown() {
  const dd = document.getElementById('setDropdown');
  const btn = document.getElementById('setBtn');
  if (!dd || !btn) return;
  dd.classList.add('open');
  btn.setAttribute('aria-expanded', 'true');
  setMenuOpen = true;
}

function closeSetDropdown() {
  const dd = document.getElementById('setDropdown');
  const btn = document.getElementById('setBtn');
  if (!dd || !btn) return;
  dd.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');
  setMenuOpen = false;
}

function toggleSetDropdown() {
  setMenuOpen ? closeSetDropdown() : openSetDropdown();
}

document.addEventListener('click', (e) => {
  if (!setMenuOpen) return;
  const dd = document.getElementById('setDropdown');
  if (!dd) return;
  if (dd.contains(e.target)) return;
  closeSetDropdown();
});

document.addEventListener('keydown', (e) => {
  if (!setMenuOpen) return;
  if (e.key === 'Escape') closeSetDropdown();
});

/* ── 카테고리 탭 ────────────────────────────────────────────────── */
function buildCatTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  Object.entries(CATEGORY)
    .filter(([, v]) => v.tab !== false)
    .forEach(([key, v]) => {
      const btn = document.createElement('button');
      btn.className = 'cat-tab'
        + (key === activeCat ? ' active' : '')
        + (key === 'friday'  ? ' friday-tab' : '');
      btn.textContent = (v.emoji ? v.emoji + ' ' : '') + v.label;
      btn.onclick = () => { activeCat = key; buildCatTabs(); renderGrid(); };
      tabs.appendChild(btn);
    });
}

/* ── 메뉴 필터 / 렌더 ────────────────────────────────────────────── */
function getVisibleMenus() {
  return menu.filter(m => {
    if (activeCat === 'friday') return m.fridayOnly;
    if (activeCat === 'all')   return fridayMode ? true : !m.fridayOnly;
    if (m.fridayOnly && !fridayMode) return false;
    return m.category.includes(activeCat);
  });
}

function renderGrid() {
  const grid    = document.getElementById('menuGrid');
  const visible = getVisibleMenus();
  visibleCount  = visible.length;
  updatePinBar();
  lastChipEl = null;

  if (visible.length === 0) {
    grid.innerHTML = '<div class="empty-state">표시할 메뉴가 없습니다</div>';
    return;
  }
  grid.innerHTML = '';
  visible.forEach(m => {
    const realIdx = menu.indexOf(m);
    const chip = document.createElement('div');
    // nocoupon 은 탭 카테고리가 아니므로 도트에서는 보여줌
    const visibleCats = m.category; // 모든 category 도트 표시 (nocoupon 포함)
    chip.className = 'menu-chip'
      + (m.fridayOnly ? ' friday-only' : '')
      + (pickedIdx === realIdx ? ' active' : '')
      + (pinnedIdxs.has(realIdx) ? ' pinned' : '');
    chip.id = 'chip-' + realIdx;
    chip.onclick = () => togglePin(realIdx);
    chip.innerHTML = `
      <div class="chip-left">
        <span class="chip-cats">${visibleCats.map(c=>`<span class="chip-cat-dot cat-${c}"></span>`).join('')}</span>
        <span class="chip-name" title="${m.name}">${m.name}</span>
      </div>
      <span class="chip-cnt">×${m.count}</span>`;
    grid.appendChild(chip);
    if (pickedIdx === realIdx) lastChipEl = chip;
  });
}

/* ── 추첨 풀 ────────────────────────────────────────────────────── */
function getDrawPool() {
  // 직접 선택된 메뉴가 있으면 해당 메뉴만 사용 (카테고리 필터 무시)
  if (pinnedIdxs.size > 0)
    return menu.map((m,i)=>({m,i})).filter(({i}) => pinnedIdxs.has(i));
  if (activeCat === 'friday') return menu.map((m,i)=>({m,i})).filter(({m})=>m.fridayOnly);
  if (activeCat === 'all') return fridayMode
    ? menu.map((m,i)=>({m,i}))
    : menu.map((m,i)=>({m,i})).filter(({m})=>!m.fridayOnly);
  return menu.map((m,i)=>({m,i})).filter(({m}) =>
    m.category.includes(activeCat) && (fridayMode ? true : !m.fridayOnly)
  );
}

/* ── 랜덤 추첨 ──────────────────────────────────────────────────── */
function pickMenu() {
  if (animTimer) return;
  const pool = getDrawPool();
  if (pool.length === 0) {
    document.getElementById('resultName').textContent = '메뉴 없음';
    document.getElementById('resultMeta').innerHTML = '<span>해당 카테고리에 메뉴가 없습니다</span>';
    return;
  }

  const total = pool.reduce((s,{m})=>s+m.count, 0);
  const box   = document.getElementById('resultBox');
  const btn   = document.getElementById('pickBtn');
  const nameEl  = document.getElementById('resultName');
  const emojiEl = document.getElementById('resultEmoji');
  const metaEl  = document.getElementById('resultMeta');

  box.classList.remove('revealed');
  box.classList.add('spinning');
  btn.disabled = true;
  pickedIdx = -1;
  if (lastChipEl) { lastChipEl.classList.remove('active'); lastChipEl = null; }

  let elapsed = 0, interval = 70;
  const totalDur = 1500;

  function step() {
    const rnd = Math.random() * total;
    let cum = 0, picked = null, pidx = 0;
    for (const {m, i} of pool) {
      cum += m.count;
      if (rnd < cum) { picked = m; pidx = i; break; }
    }
    if (!picked) { picked = pool[pool.length-1].m; pidx = pool[pool.length-1].i; }

    const primaryCat = picked.category.find(c => CATEGORY[c]?.tab !== false) || picked.category[0] || 'other';
    emojiEl.textContent = CATEGORY[primaryCat]?.emoji || '🍽️';
    nameEl.textContent  = picked.name;

    // 카테고리 뱃지 (tab:false 인 nocoupon 제외, 별도 경고로 표시)
    const catBadges = picked.category
      .filter(c => CATEGORY[c]?.tab !== false)
      .map(c => `<span class="badge${picked.fridayOnly ? ' friday-badge' : ''}">${CATEGORY[c]?.label||c}</span>`)
      .join('');
    const noCouponWarn = picked.category.includes('nocoupon')
      ? `<span class="nocoupon-badge">🚫 식권대장 안됨</span>` : '';
    metaEl.innerHTML = `<div class="cat-badges">${catBadges}</div>${noCouponWarn}<span>가중치 ×${picked.count} / 전체 ${total}표</span>`;

    // 칩 하이라이트 — querySelectorAll 대신 직접 참조
    if (lastChipEl) lastChipEl.classList.remove('active');
    const chip = document.getElementById('chip-' + pidx);
    if (chip) { chip.classList.add('active'); lastChipEl = chip; }

    elapsed += interval;
    if (elapsed < totalDur) {
      interval = Math.min(interval * 1.09, 320);
      animTimer = setTimeout(step, interval);
    } else {
      box.classList.remove('spinning');
      box.classList.add('revealed');
      btn.disabled = false;
      animTimer = null;
      pickedIdx = pidx;
      if (chip) chip.scrollIntoView({ behavior:'smooth', block:'nearest' });
      if (fridayMode) burstEmojis();
    }
  }
  animTimer = setTimeout(step, interval);
}

/* ── 메뉴 직접 선택(핀) ──────────────────────────────────────────── */
function togglePin(idx) {
  if (pinnedIdxs.has(idx)) pinnedIdxs.delete(idx);
  else pinnedIdxs.add(idx);
  updatePinBar();
  const chip = document.getElementById('chip-' + idx);
  if (chip) chip.classList.toggle('pinned', pinnedIdxs.has(idx));
}

function clearPins() {
  pinnedIdxs.clear();
  updatePinBar();
  renderGrid();
}

function updatePinBar() {
  document.getElementById('pickBtn').querySelector('.btn-text').textContent =
    pinnedIdxs.size > 0 ? '🎯 선택 메뉴 뽑기' : '🎲 랜덤 뽑기';
  const countEl = document.getElementById('menuCount');
  if (!countEl) return;
  const base = `${visibleCount}개 메뉴`;
  if (pinnedIdxs.size > 0) {
    countEl.innerHTML = `${base} · <span style="color:#1A8A5A;font-weight:600">${pinnedIdxs.size}개 선택</span>
      <button class="pin-clear-btn" onclick="clearPins()">초기화</button>`;
  } else {
    countEl.textContent = base;
  }
}

/* ── 금요일 모드 ────────────────────────────────────────────────── */
function toggleFriday() {
  fridayMode = !fridayMode;
  activeCat = fridayMode ? 'friday' : 'all';
  applyPartyMode();
  buildCatTabs();
  renderGrid();
}

function applyPartyMode() {
  document.getElementById('fridayLabel').textContent = fridayMode ? '🎉 금요일 모드 ON' : '금요일 모드';
  document.getElementById('fridayToggle').classList.toggle('friday-on', fridayMode);
  document.getElementById('pickBtn').classList.toggle('friday-mode', fridayMode);
  document.body.classList.toggle('party', fridayMode);
  fridayMode ? startConfetti() : stopConfetti();
}

/* ── 컨페티 ─────────────────────────────────────────────────────── */
let confettiPieces = [];

function mkPiece(w, h, fromTop) {
  return {
    x: Math.random() * w,
    y: fromTop ? -20 : Math.random() * h,
    r: Math.random() * 5 + 3,
    color: CONFETTI_COLORS[Math.random() * CONFETTI_COLORS.length | 0],
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.12,
    vx: (Math.random() - 0.5) * 1.2,
    vy: Math.random() * 1.2 + 0.6,
    rect: Math.random() > 0.5,
    pw: Math.random() * 8 + 4,
    ph: Math.random() * 4 + 3,
    alpha: Math.random() * 0.4 + 0.55,
  };
}

function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  confettiPieces = Array.from({length: 60}, () => mkPiece(canvas.width, canvas.height, false));
  confettiRunning = true;
  canvas.classList.add('active');
  if (!confettiRAF) confettiRAF = requestAnimationFrame(drawConfetti);
}

function stopConfetti() {
  confettiRunning = false;
  confettiRAF = null;
  const canvas = document.getElementById('confetti-canvas');
  canvas.classList.remove('active');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function drawConfetti() {
  if (!confettiRunning) { confettiRAF = null; return; }
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  for (const p of confettiPieces) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle   = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.rect) ctx.fillRect(-p.pw/2, -p.ph/2, p.pw, p.ph);
    else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, 6.283); ctx.fill(); }
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
    if (p.y > H + 20) Object.assign(p, mkPiece(W, H, true));
  }
  confettiRAF = requestAnimationFrame(drawConfetti);
}

window.addEventListener('resize', () => {
  if (!fridayMode) return;
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

/* ── 추첨 완료 이모지 ─────────────────────────────────────────────── */
function burstEmojis() {
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'party-emoji';
      el.textContent = PARTY_EMOJIS[Math.random() * PARTY_EMOJIS.length | 0];
      el.style.cssText = `left:${Math.random()*88+4}vw;bottom:-30px;font-size:${Math.random()*12+16}px;animation-duration:${Math.random()*1.5+2.5}s`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), {once:true});
    }, i * 70);
  }
}

init();
</script>
